<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e8e8e8;
      font-family: "Courier New", Courier, monospace;
      font-size: 1rem;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main { flex: 1; padding: 1rem; }

    .session-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    h1 { font-size: 1.25rem; }

    #clear-btn {
      background: none;
      border: 1px solid #555;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      border-radius: 3px;
    }

    #clear-btn:hover { border-color: #aaffff; color: #aaffff; }

    #clear-btn:focus-visible {
      outline: 3px solid #ffff85;
      outline-offset: 2px;
    }

    section[aria-label="Terminal session"] {
      overflow: auto;
      max-height: calc(100vh - 6rem);
      outline: none; /* tabindex=-1, no visible focus ring needed */
    }

    details { border-bottom: 1px solid #333; }

    summary {
      cursor: pointer;
      padding: 0.5rem 0;
      list-style: none; /* remove default triangle on some browsers */
    }
    summary::-webkit-details-marker { display: none; }

    summary:focus-visible {
      outline: 3px solid #ffff85;
      outline-offset: 2px;
    }

    summary h2 {
      display: inline;
      font-size: 1rem;
      font-weight: bold;
      color: #aaffff;
    }

    details p {
      padding: 0.15rem 1.5rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    footer {
      padding: 0.5rem 1rem;
      border-top: 1px solid #333;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #reconnect-btn {
      background: none;
      border: 1px solid #555;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.2rem 0.6rem;
      cursor: pointer;
      border-radius: 3px;
    }

    #reconnect-btn:hover { border-color: #aaffff; color: #aaffff; }

    #reconnect-btn:focus-visible {
      outline: 3px solid #ffff85;
      outline-offset: 2px;
    }

    #connection-status { color: #aaffaa; }
    #connection-status[data-state="disconnected"] { color: #ff8585; }
    #connection-status[data-state="error"] { color: #ff8585; }
    #connection-status[data-state="exited"] { color: #e8e8e8; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="session-header">
      <h1>Terminal</h1>
      <button type="button" id="clear-btn">Clear session</button>
    </div>
    <section aria-label="Terminal session" tabindex="-1" id="session">
    </section>
  </main>

  <footer>
    <div role="status" id="connection-status" data-state="connecting">Connecting…</div>
    <button type="button" id="reconnect-btn" hidden>Reconnect</button>
  </footer>

  <!-- Live region for output announcements. Kept after footer so it is not
       encountered during normal forward navigation of the session groups. -->
  <div aria-live="polite" aria-label="Output announcements" class="sr-only" id="announcer"></div>

  <script src="/ansi.js"></script>
  <script src="/app.js"></script>
</body>
</html>
